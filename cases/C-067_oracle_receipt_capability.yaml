id: C-067
title: "append_oracle_accepted capability leak (V-1)"
constitution:
  - "Art. I.1.1 PCP: 防止 soundness error 放大到 1"
  - "Art. V.1.3 JudgeAI: 验证必须对 caller 不可伪造"
  - "C-011: forbidden tactic enforcement at every ∏p entry point"
source_lessons: []
incident: |
  2026-04-22 Codex 外部审计（V-1，EXT_CODEX_2026-04-22.md）：
  `src/bus.rs:174-176` `append_oracle_accepted(author, payload, parent_id)`
  是 public API 且将 `oracle_blessed = true` 直接传给 `append_internal`。
  防御只靠调用点纪律 — 任何新 tool 或测试能 bypass `forbidden_patterns`。

  Codex VETO 原文："capability-weak: the blessed write is protected by
  call-site convention, not by a capability or proof token."

  后果链路：如果 Paper 2/3 接入外部 agent（Phase 11+），它们若能调用
  bus（即便只读 via 接口），理论上可伪造 `oracle_blessed=true` 插入
  `by native_decide` 到 tape。F-2026-04-20-05 class 攻击复刻。
facts: |
  这是 "depth of defense" 问题。表面看多层封堵：
  1. `lean4_oracle.rs:113` `verify_omega_detailed` 前置 `check_payload`
  2. `bus.rs:179-190` `append_internal(oracle_blessed=false)` 跑 forbidden_patterns
  3. `routines/daily_drift.yaml` 每日 positive verify
  4. `verify_partial` 也前置 `check_payload`

  但第 2 层被 `append_oracle_accepted` 合法 bypass — **4 层并非独立，
  最强的 capability gate 是 convention**。
ruling: |
  修复：capability token 化。
  1. 新 trait `Predicate` + `Verdict` enum (M-1 泛化预留)
  2. 新 `OracleReceipt { payload_hash, verdict, predicate_kind }` 结构
  3. `OracleReceipt::for_lean4_complete(payload)` 构造函数：sha256 绑定
  4. `append_oracle_accepted(..., receipt: &OracleReceipt)` 签名强制
  5. Bus 先 `receipt.validates(payload)` 再进入 `append_internal`
  6. 伪造 receipt 要求知道 payload hash up front → 不是 runtime capability

  Phase 10c 将扩展 `signature: Option<[u8; 64]>`（Ed25519）给外部 agent 用。
precedent: |
  后续标准：
  1. 任何 `oracle_blessed=true` 等价 flag 都**必须**有 capability token 配套
  2. 新增 `append_oracle_accepted_*` 变体 → 沿用 OracleReceipt 协议
  3. Paper 2/3 的 `StatisticalPCP` / `ExternalAudit` Predicate 实现必须
     产出 OracleReceipt（可能带 signature）
  4. CI 可加 grep linter：`append_oracle_accepted(` 调用如果前面 20 行
     内没有 `OracleReceipt::for_` → warn

  Phase 8.C 已修复 via commit 6c36bff + 5 + 4 regression tests。
rule: R-CAPABILITY-001
date: "2026-04-22"
severity: critical
