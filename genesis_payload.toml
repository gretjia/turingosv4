igible eligibility-boundary semantic-fix): the original TB-16.x.2.2 helper used `if elapsed <= window_delta_logical_t { continue; }` ‚Äî i.e. require elapsed > delta. With delta=0 the helper required ‚â•1 round to pass, contradicting its own docstring claim "delta=0 makes every Open case immediately eligible". Smoke r3 (post-Patch-A) showed FORCE_CHALLENGE_RESOLVE batch returning count=0 because q.q_t.current_round is NOT auto-advanced per-tx (unlike tb11_emit_expire_for_eligible's caller-supplied current_logical_t which auto-advances per-tx); the OMEGA-Confirm path opens the case and scans within the same round, so elapsed=0 for delta=0 was always skipped. Patch E flips the boundary to `if elapsed < window_delta_logical_t { continue; }` (require elapsed >= delta), aligning impl with docstring. Sole callers of this helper today are the FORCE_-prefixed arena hooks; no production caller depends on the prior off-by-one boundary. Docstring updated to reflect `>= delta` and to clarify the time-unit difference vs tb11. Predecessor TB-16.x.2.2 hash a9bbb1ac superseded.  # rehashed by TB-16.x.2.2 (2026-05-05; architect umbrella charter ¬ß2 Atom 2.2 ‚Äî ChallengeResolve via challenge-window scheduler): ADDITIVE ‚Äî added tb16_emit_challenge_resolve_for_eligible(seq, window_delta_logical_t, default_resolution) helper. Mirrors tb11_emit_expire_for_eligible shape: scan economic_state_t.challenge_cases_t for entries with status=Open AND q.q_t.current_round - case.opened_at_round > window_delta; emit ChallengeResolveTx via emit_system_tx (SystemEmitCommand::ChallengeResolve) for each eligible case. Returns (count, bonds_released_micro). emit_system_tx for ChallengeResolve does NOT pre-check case existence/status (sequencer.rs:2590 ‚Äî construction is unconditional); dispatch-time AlreadyResolved/ChallengeNotFound surfaces as L4.E rejection, not Err here. Predecessor TB-16 Atom 7 R1 Step 3 hash 3390205f superseded.  # rehashed by TB-16 Atom 7 R1 Step 3 (2026-05-04; architect ¬ß7.3