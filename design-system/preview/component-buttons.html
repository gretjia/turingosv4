<!doctype html>
<html lang="zh"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body class="card"><div class="card-body" style="justify-content:flex-start;gap:18px">
  <div style="display:flex;gap:18px;flex-wrap:wrap;align-items:center">
    <!-- primary filled -->
    <button style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:0.18em;font-weight:500;background:var(--fg);color:var(--bg);border:none;padding:12px 22px;border-radius:2px;cursor:pointer">Open Task</button>
    <!-- ghost text + underline (primary CTA in the welcome wizard) -->
    <button style="font-family:var(--font-mono);font-size:14px;font-weight:500;text-transform:uppercase;letter-spacing:0.16em;color:var(--accent);background:transparent;border:none;border-bottom:1px solid var(--accent);padding:8px 0;cursor:pointer">开始 spec 访谈 →</button>
    <!-- soft / back -->
    <button style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.16em;color:var(--fg-subtle);background:transparent;border:none;padding:8px 0;cursor:pointer">← back</button>
  </div>
  <div style="display:flex;gap:18px;flex-wrap:wrap;align-items:center">
    <button disabled style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:0.18em;font-weight:500;background:var(--fg-subtle);color:var(--bg);border:none;padding:12px 22px;border-radius:2px">disabled</button>
    <button style="font-family:var(--font-mono);font-size:14px;font-weight:500;text-transform:uppercase;letter-spacing:0.16em;color:var(--fg-subtle);background:transparent;border:none;border-bottom:1px solid var(--fg-subtle);padding:8px 0">submitting…</button>
    <span class="token" style="margin-left:auto">filled ink · ghost underline · soft subtle</span>
  </div>
</div></body></html>
