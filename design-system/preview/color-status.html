<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body class="card"><div class="card-body">
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;align-items:end">
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start">
      <div style="width:6px;height:6px;border-radius:50%;background:#1F6E6B"></div>
      <span style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:#1F6E6B;border:1px solid currentColor;border-radius:2px;padding:3px 8px">Open</span>
      <span class="token">#1F6E6B</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start">
      <div style="width:6px;height:6px;border-radius:50%;background:#3F6E3F"></div>
      <span style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:#3F6E3F;border:1px solid currentColor;border-radius:2px;padding:3px 8px">Accepted</span>
      <span class="token">#3F6E3F</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start">
      <div style="width:6px;height:6px;border-radius:50%;background:#9C3A2F"></div>
      <span style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:#9C3A2F;border:1px solid currentColor;border-radius:2px;padding:3px 8px">Rejected</span>
      <span class="token">#9C3A2F</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start">
      <div style="width:6px;height:6px;border-radius:50%;background:#A87431"></div>
      <span style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:#A87431;border:1px solid currentColor;border-radius:2px;padding:3px 8px">Finalized</span>
      <span class="token">#A87431</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start">
      <div style="width:6px;height:6px;border-radius:50%;background:#3A3633"></div>
      <span style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:#3A3633;border:1px solid currentColor;border-radius:2px;padding:3px 8px">Bankrupt</span>
      <span class="token">#3A3633</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start">
      <div style="width:6px;height:6px;border-radius:50%;background:#807974"></div>
      <span style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:#807974;border:1px solid currentColor;border-radius:2px;padding:3px 8px">Expired</span>
      <span class="token">#807974</span>
    </div>
  </div>
</div></body></html>
