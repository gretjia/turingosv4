<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body class="card"><div class="card-body" style="gap:18px;justify-content:center">
  <div style="display:flex;flex-wrap:wrap;gap:10px">
    <span style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.16em;padding:4px 10px;border-radius:2px;border:1px solid #1F6E6B;color:#1F6E6B"><span style="width:6px;height:6px;border-radius:50%;background:currentColor"></span>open</span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.16em;padding:4px 10px;border-radius:2px;border:1px solid #3F6E3F;color:#3F6E3F"><span style="width:6px;height:6px;border-radius:50%;background:currentColor"></span>accepted</span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.16em;padding:4px 10px;border-radius:2px;border:1px solid #9C3A2F;color:#9C3A2F"><span style="width:6px;height:6px;border-radius:50%;background:currentColor"></span>rejected</span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.16em;padding:4px 10px;border-radius:2px;border:1px solid #A87431;color:#A87431"><span style="width:6px;height:6px;border-radius:50%;background:currentColor"></span>finalized</span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.16em;padding:4px 10px;border-radius:2px;border:1px solid #3A3633;color:#3A3633"><span style="width:6px;height:6px;border-radius:50%;background:currentColor"></span>bankrupt</span>
    <span style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.16em;padding:4px 10px;border-radius:2px;border:1px solid #807974;color:#807974"><span style="width:6px;height:6px;border-radius:50%;background:currentColor"></span>expired</span>
  </div>
  <p class="token">.tos-status — 6 px dot + uppercase mono caps · border:1px solid currentColor</p>
</div></body></html>
