<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body class="card"><div class="card-body">
  <div style="display:flex;gap:32px;align-items:center;justify-content:flex-start">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:64px;height:64px;border:1px solid var(--hairline-strong);background:var(--bg-elev);border-radius:0"></div>
      <span class="label">0 px</span>
      <span class="token">tables · rules</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:64px;height:64px;border:1px solid var(--hairline-strong);background:var(--bg-elev);border-radius:2px"></div>
      <span class="label">radius-sm 2 px</span>
      <span class="token">badges · inputs</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:64px;height:64px;border:1px solid var(--hairline-strong);background:var(--bg-elev);border-radius:3px"></div>
      <span class="label">radius-md 3 px</span>
      <span class="token">cards · pills</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:36px;height:36px;border:1px solid var(--accent);background:var(--bg);border-radius:50%;color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:500;font-size:14px">3</div>
      <span class="label">circle</span>
      <span class="token">progress dots only</span>
    </div>
  </div>
  <p style="margin:20px 0 0;font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);letter-spacing:0.04em">
    Restrained. Max 3 px on any rectangle. No pillowy radius.
  </p>
</div></body></html>
