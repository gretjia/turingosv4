<!doctype html>
<html lang="zh"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .pr { list-style:none; display:grid; grid-template-columns:repeat(5,1fr); padding:0 0 4px; margin:0; position:relative; }
  .pr::before { content:""; position:absolute; top:18px; left:10%; right:10%; height:1px; background:var(--hairline); z-index:0; }
  .pr li { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center; }
  .num { font-family:var(--font-mono); font-size:14px; font-weight:500; font-variant-numeric:tabular-nums; width:36px; height:36px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; background:var(--bg); border:1px solid var(--hairline-strong); color:var(--fg-subtle); }
  li[data-p="active"] .num { border-color:var(--accent); color:var(--accent); box-shadow:0 0 0 4px var(--bg); }
  li[data-p="done"]   .num { border-color:var(--accent); background:var(--accent); color:var(--bg); }
  .lbl { font-family:var(--font-body); font-size:11px; color:var(--fg-subtle); line-height:1.3; }
  li[data-p="active"] .lbl { color:var(--fg); }
  li[data-p="done"]   .lbl { color:var(--fg-muted); }
</style>
</head>
<body class="card"><div class="card-body" style="justify-content:flex-start">
  <ol class="pr">
    <li data-p="done"><span class="num">1</span><span class="lbl">准备工作站</span></li>
    <li data-p="done"><span class="num">2</span><span class="lbl">配置模型</span></li>
    <li data-p="active"><span class="num">3</span><span class="lbl">API 密钥</span></li>
    <li data-p="pending"><span class="num">4</span><span class="lbl">注册 Agent</span></li>
    <li data-p="pending"><span class="num">5</span><span class="lbl">就绪</span></li>
  </ol>
  <p class="token" style="margin:14px 0 0">5-step welcome wizard · 36 px dots · hairline connector</p>
</div></body></html>
