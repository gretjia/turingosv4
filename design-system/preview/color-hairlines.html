<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body class="card"><div class="card-body">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
    <div style="display:flex;flex-direction:column;gap:12px">
      <div style="border-top:1px solid #E5E3DC;padding-top:14px">
        <span class="label">hairline</span>
        <div class="token" style="margin-top:4px">#E5E3DC · default rule, table cells, card borders</div>
      </div>
      <div style="border-top:1px solid #C9C5BC;padding-top:14px">
        <span class="label">hairline-strong</span>
        <div class="token" style="margin-top:4px">#C9C5BC · inputs, scrollbar thumb, wordmark pill</div>
      </div>
      <div style="border-top:2px solid #1A1817;padding-top:14px">
        <span class="label">fg</span>
        <div class="token" style="margin-top:4px">2px solid · table thead underline</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="border:1px solid #E5E3DC;padding:14px;background:#FAFAF7">
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);letter-spacing:0.16em;text-transform:uppercase">default card</div>
        <div class="token" style="margin-top:6px">1px hairline · paper bg</div>
      </div>
      <div style="border:1px solid #E5E3DC;border-left:3px solid #1F6E6B;padding:14px;background:#FAFAF7">
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);letter-spacing:0.16em;text-transform:uppercase">agent card</div>
        <div class="token" style="margin-top:6px">3px accent left-stripe · only used for status</div>
      </div>
    </div>
  </div>
</div></body></html>
