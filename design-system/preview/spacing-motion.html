<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  @keyframes sweep { from { transform: translateX(-100%); } to { transform: translateX(0); } }
  @keyframes rise  { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: translateY(0); } }
  @keyframes dot   { 0%,80%,100% { opacity:0.2; } 40% { opacity:1; } }
  .sweep-track { position:relative; overflow:hidden; height:1px; background: var(--hairline); }
  .sweep-track::after {
    content:""; position:absolute; inset:0; background: var(--accent);
    animation: sweep 320ms cubic-bezier(0.2,0.7,0.2,1) infinite;
    animation-delay: 0s;
  }
  .rise { animation: rise 280ms cubic-bezier(0.2,0.7,0.2,1) infinite; }
  .dots span { display:inline-block; opacity:0.2; margin:0 1px; animation: dot 1.4s cubic-bezier(0.2,0.7,0.2,1) infinite; font-family: var(--font-display); }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body class="card"><div class="card-body">
  <div style="display:grid;grid-template-columns:1.1fr 0.9fr 1fr;gap:22px;align-items:center">
    <div>
      <span class="label">120 / 180 / 320 ms</span>
      <div class="sweep-track" style="margin-top:14px"></div>
      <span class="token" style="margin-top:8px;display:block">card-mount accent sweep</span>
    </div>
    <div>
      <span class="label">ease</span>
      <div class="rise" style="margin-top:10px;display:inline-block;padding:6px 12px;border:1px solid var(--hairline-strong);font-family:var(--font-mono);font-size:11px;letter-spacing:0.04em;color:var(--fg-muted)">cubic-bezier(.2,.7,.2,1)</div>
      <span class="token" style="margin-top:8px;display:block">rise + fade in</span>
    </div>
    <div>
      <span class="label">loading</span>
      <div style="margin-top:6px;font-family:var(--font-display);font-style:italic;font-size:20px;color:var(--fg-muted);font-variation-settings:'opsz' 80,'SOFT' 50">加载中<span class="dots" aria-hidden="true"><span>·</span><span>·</span><span>·</span></span></div>
      <span class="token" style="margin-top:8px;display:block">never a spinner gif</span>
    </div>
  </div>
</div></body></html>
