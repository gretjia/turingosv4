<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body class="card"><div class="card-body">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch">
    <div style="background:#1F6E6B;color:#FAFAF7;padding:24px 22px;display:flex;flex-direction:column;justify-content:space-between;min-height:96px">
      <div style="font-family:var(--font-display);font-style:italic;font-size:22px;font-variation-settings:'opsz' 80,'SOFT' 50">oxidized teal</div>
      <div style="display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase">
        <span>accent</span><span style="opacity:0.7">#1F6E6B</span>
      </div>
    </div>
    <div style="background:#C7DDDB;color:#1A1817;padding:24px 22px;display:flex;flex-direction:column;justify-content:space-between;min-height:96px;border:1px solid var(--hairline)">
      <div style="font-family:var(--font-display);font-style:italic;font-size:22px;font-variation-settings:'opsz' 80,'SOFT' 50">accent soft</div>
      <div style="display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--fg-muted)">
        <span>accent-soft</span><span>#C7DDDB</span>
      </div>
    </div>
  </div>
  <p style="margin:14px 0 0;font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);letter-spacing:0.04em;max-width:none">
    The one and only accent. Used for links, active nav, success rules, the rotated square in the wordmark. Never purple. Never a second accent.
  </p>
</div></body></html>
