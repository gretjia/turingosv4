<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body class="card" style="background:var(--bg)"><div class="card-body" style="justify-content:flex-start;gap:18px">
  <div style="display:grid;grid-template-columns:120px 1fr 120px;gap:18px;align-items:stretch">
    <div style="display:flex;align-items:center;justify-content:center;border:1px solid var(--hairline);padding:14px">
      <div style="width:48px;height:48px;display:flex;align-items:center;justify-content:center">
        <div style="width:34px;height:34px;background:var(--accent);transform:rotate(45deg)"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;border:1px solid var(--hairline);padding:14px;background:#14110E">
      <div style="width:48px;height:48px;display:flex;align-items:center;justify-content:center">
        <div style="width:34px;height:34px;background:#5BB3A6;transform:rotate(45deg)"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;border:1px solid var(--hairline);padding:14px">
      <div style="width:48px;height:48px;display:flex;align-items:center;justify-content:center">
        <div style="width:34px;height:34px;background:var(--fg);transform:rotate(45deg)"></div>
      </div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:120px 1fr 120px;gap:18px;text-align:center">
    <span class="label">accent / paper</span>
    <span class="label">accent / dark</span>
    <span class="label">ink / paper</span>
  </div>
</div></body></html>
