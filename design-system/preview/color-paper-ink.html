<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .swatch { display:flex; gap:14px; align-items:center; }
  .chip   { width:64px; height:64px; border:1px solid var(--hairline-strong); flex:none; }
  .meta   { display:flex; flex-direction:column; gap:2px; }
  .name   { font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:0.18em; color:var(--fg); }
  .hex    { font-family:var(--font-mono); font-size:11px; color:var(--fg-muted); letter-spacing:-0.01em; }
  .row    { display:grid; grid-template-columns:repeat(5,1fr); gap:18px; }
</style>
</head>
<body class="card"><div class="card-body">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#FAFAF7"></div><div class="meta"><span class="name">bg</span><span class="hex">#FAFAF7</span><span class="hex" style="color:var(--fg-subtle)">paper</span></div></div>
    <div class="swatch"><div class="chip" style="background:#F5F4EE"></div><div class="meta"><span class="name">bg-elev</span><span class="hex">#F5F4EE</span><span class="hex" style="color:var(--fg-subtle)">raised</span></div></div>
    <div class="swatch"><div class="chip" style="background:#1A1817"></div><div class="meta"><span class="name">fg</span><span class="hex">#1A1817</span><span class="hex" style="color:var(--fg-subtle)">ink</span></div></div>
    <div class="swatch"><div class="chip" style="background:#5B5651"></div><div class="meta"><span class="name">fg-muted</span><span class="hex">#5B5651</span><span class="hex" style="color:var(--fg-subtle)">muted</span></div></div>
    <div class="swatch"><div class="chip" style="background:#8B847C"></div><div class="meta"><span class="name">fg-subtle</span><span class="hex">#8B847C</span><span class="hex" style="color:var(--fg-subtle)">subtle</span></div></div>
  </div>
</div></body></html>
