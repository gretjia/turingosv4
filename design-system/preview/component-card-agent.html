<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body class="card"><div class="card-body" style="justify-content:flex-start">
  <article style="border:1px solid var(--hairline);border-left:3px solid var(--accent);background:var(--bg);padding:14px 18px">
    <header style="display:flex;justify-content:space-between;align-items:baseline;gap:16px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--hairline)">
      <span style="font-family:var(--font-mono);font-weight:500;font-size:14px;letter-spacing:-0.01em;color:var(--fg);word-break:break-all">agent_001</span>
      <span style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--fg-muted)">solver</span>
    </header>
    <dl style="display:grid;grid-template-columns:max-content 1fr;gap:4px 24px;margin:0">
      <dt style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--fg-subtle)">pubkey</dt>
      <dd style="margin:0;font-family:var(--font-mono);font-size:13px;color:var(--fg);word-break:break-word">ed25519:5b8c…a23f</dd>
      <dt style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--fg-subtle)">balance</dt>
      <dd style="margin:0;font-family:var(--font-mono);font-size:13px;color:var(--fg);font-variant-numeric:tabular-nums">1 240 000 µC</dd>
      <dt style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--fg-subtle)">status</dt>
      <dd style="margin:0">
        <span style="display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.16em;padding:3px 8px;border-radius:2px;border:1px solid #3F6E3F;color:#3F6E3F">
          <span style="width:6px;height:6px;border-radius:50%;background:currentColor"></span>active
        </span>
      </dd>
    </dl>
  </article>
</div></body></html>
