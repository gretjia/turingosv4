<!doctype html>
<html lang="zh"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body class="card"><div class="card-body" style="justify-content:flex-start;gap:18px">
  <!-- hairline-bottom textarea (spec grill input) -->
  <div>
    <label style="display:block;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--fg-muted);margin-bottom:6px">spec answer</label>
    <textarea readonly style="width:100%;font-family:var(--font-body);font-size:20px;line-height:1.55;color:var(--fg);background:transparent;border:none;border-bottom:1px solid var(--accent);padding:10px 0;resize:none;outline:none">把每周的电费账单截图自动归档到一个文件夹里</textarea>
  </div>
  <!-- bordered field (welcome api key input) -->
  <div>
    <label style="display:block;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--fg-muted);margin-bottom:6px">SILICONFLOW_API_KEY</label>
    <input type="password" placeholder="sk-..." style="width:100%;font-family:var(--font-mono);font-size:14px;color:var(--fg);background:var(--bg);border:1px solid var(--hairline-strong);border-radius:2px;padding:10px 12px;outline:none">
  </div>
</div></body></html>
