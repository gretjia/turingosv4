# K-HARDEN-8: Aider config — auto-load the shared harness contract on cold start.
#
# Aider loads these as read-only context every session, so it sees the same
# canonical contract (AGENTS.md) as every other platform. Governance is
# single-sourced in AGENTS.md; CONVENTIONS.md adds only Aider-specific shape.
read:
  - AGENTS.md
  - CONVENTIONS.md
  - HARNESS_PLAYBOOK.md

# Verbose chat history so subagent PRELUDE/POSTLUDE compliance is auditable.
chat-history-file: .aider.chat.history.md

# Don't auto-commit; the harness uses an explicit PR-only workflow (AGENTS.md §14a).
auto-commits: false

# Don't lint with aider's built-in — the constitution gates are the lint path.
auto-lint: false

# Sanity check before opening a PR.
test-cmd: bash scripts/run_constitution_gates.sh
