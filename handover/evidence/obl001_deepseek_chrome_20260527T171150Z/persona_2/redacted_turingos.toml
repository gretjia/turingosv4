# TuringOS LLM configuration (auto-generated by `turingos init --provider deepseek`).
# Provider: DeepSeek direct API (https://api.deepseek.com).
#
# REQUIRED: set both env vars in your shell before running `turingos spec` or `generate`:
#   export DEEPSEEK_API_KEY="[REDACTED]"          # Meta role key (reasoning)
#   export DEEPSEEK_API_KEY_WORKER="[REDACTED]"   # Worker role key (codegen) — use a SEPARATE key to avoid DeepSeek-side cache pollution
#
# Also set the endpoint:
#   export TURINGOS_SILICONFLOW_ENDPOINT="https://api.deepseek.com/v1/chat/completions"

llm.meta.api_key_env = "DEEPSEEK_API_KEY"
llm.meta.model = "deepseek-v4-pro"
llm.meta.thinking = "on"

llm.blackbox.api_key_env = "DEEPSEEK_API_KEY_WORKER"
llm.blackbox.model = "deepseek-v4-flash"
llm.blackbox.thinking = "off"
