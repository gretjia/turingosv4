# TuringOS genesis payload — Multi-agent arena template
# Generated by `turingos init --template multi-agent`
#
# TISR Phase 6.0/6.1 alpha scaffold. Edit before running batches.
#
# Unit reference: 1 Coin = 1_000_000 micro. All *_micro fields below use
# integer micro-Coin to avoid floating-point money rounding.
#
# 10 AgentRole variants supported (REAL-5 8 original + REAL-12 Bull/Bear):
#   Solver / Verifier / Challenger / Trader / MarketMaker /
#   Architect / Veto / Observer / BullTrader / BearTrader

[meta]
template = "multi-agent"
spec_version = "1.0"

[market]
type = "multi_agent_arena"

[budget]
initial_balance_micro = 1_000_000

# Phase 6.1+: multi-agent role assignments (REAL-5 / REAL-12 style)
# 10 AgentRole variants supported (REAL-5 original 8 + REAL-12 Bull/Bear).
# Until `turingos agent deploy` lands, edit `agent_pubkeys.json` manually
# and bootstrap via experiments/minif2f_v4/src/bin/lean_market.rs.
#
# [[agents]]
# name = "Agent_bull_0"
# role = "BullTrader"
# budget_micro = 500_000
# model = "deepseek-v4-flash"
#
# [[agents]]
# name = "Agent_bear_0"
# role = "BearTrader"
# budget_micro = 500_000
# model = "claude-haiku-4-5"

# Polymarket PR-B (2026-05-23) — Treasury + multi-agent market wallets.
# Read at Q_0 by src/runtime/bootstrap.rs::parse_treasury_and_worker_preseed.
[treasury]
agent_id = "treasury"
initial_balance_micro = 100_000

[worker_wallets]
"worker-alpha" = 10_000
"worker-beta" = 10_000
"worker-gamma" = 10_000
"verifier-alpha" = 10_000
"market-provider" = 10_000
