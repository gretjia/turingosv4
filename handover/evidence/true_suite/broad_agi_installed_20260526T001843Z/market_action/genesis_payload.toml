# TuringOS genesis payload — Proof market template
# Generated by `turingos init --template proof`
#
# TISR Phase 6.0/6.1 alpha scaffold. Edit before running batches.
#
# Unit reference: 1 Coin = 1_000_000 micro. All *_micro fields below use
# integer micro-Coin to avoid floating-point money rounding.

[meta]
template = "proof"
spec_version = "1.0"

[market]
type = "lean_proof"
default_bounty_micro = 100_000

[budget]
initial_balance_micro = 1_000_000
max_attempts_per_task = 100

# Phase 6.1+: agent role assignments
# Use `turingos role assign --agent <id> --role <role>` once implemented.
# Until then, edit `agent_pubkeys.json` manually and run lean_market for the
# original TB-10 workflow.
#
# [[agents]]
# name = "Agent_solver_0"
# role = "Solver"
# budget_micro = 500_000
# model = "deepseek-v4-flash"

# Polymarket PR-B (2026-05-23) — Treasury + multi-agent market wallets.
# Read at Q_0 by src/runtime/bootstrap.rs::parse_treasury_and_worker_preseed.
# Total = 150_000 µ (= 100_000 treasury + 3 workers + verifier + provider).
[treasury]
agent_id = "treasury"
initial_balance_micro = 100_000

[worker_wallets]
"worker-alpha" = 10_000
"worker-beta" = 10_000
"worker-gamma" = 10_000
"verifier-alpha" = 10_000
"market-provider" = 10_000
